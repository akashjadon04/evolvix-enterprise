<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmission Received | Zyrova</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            overflow: hidden;
        }
        .success-card {
            text-align: center;
            padding: 3rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #10b981;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            animation: popIn 0.5s ease;
        }
        .icon-circle {
            width: 80px; height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        h1 { color: #fff; margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .btn-home {
            background: #10b981; color: #020617;
            padding: 1rem 2rem; border-radius: 50px;
            text-decoration: none; font-weight: bold;
            transition: all 0.3s;
        }
        .btn-home:hover { box-shadow: 0 0 20px #10b981; }
        #confetti { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>
    <div class="success-card">
        <div class="icon-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>Message Received</h1>
        <p>We have secured your request. <br>Expect a reply within 2 hours.</p>
        <a href="index.html" class="btn-home">Return to Homepage</a>
    </div>

    <script>
        // Simple Physics Confetti
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const particles = [];
        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ffffff'];

        function init() {
            for(let i=0; i<100; i++) {
                particles.push({
                    x: canvas.width/2, y: canvas.height/2,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 5,
                    size: Math.random() * 5 + 2, color: colors[Math.floor(Math.random()*colors.length)]
                });
            }
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                if(p.y > canvas.height) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
