    <style>

/* Reset some base variables for dashboard */
:root { --dash-nav-h: 70px; }
.admin-layout { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.admin-header { height: var(--dash-nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: rgba(10,18,42,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-glass); z-index: 100; }
.admin-main { display: flex; flex: 1; overflow: hidden; }
.admin-sidebar { width: 300px; background: rgba(4,8,24,0.5); border-right: 1px solid var(--border-glass); padding: 2rem; overflow-y: auto; }
.admin-content { flex: 1; padding: 3rem; overflow-y: auto; background: radial-gradient(circle at top left, rgba(14,116,144,0.05), transparent 60%); }

/* Dashboard specifics */
.auth-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-deep); z-index: 9999999; }
.auth-box { background: rgba(10,18,42,0.9); padding: 3rem; border-radius: 20px; border: 1px solid rgba(103,232,249,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; width: 400px; }
.panel-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
.client-li { padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.client-li:hover { background: rgba(255,255,255,0.05); }
.client-li.active { background: rgba(103,232,249,0.1); border-color: rgba(103,232,249,0.3); }

/* Messages */
.msg-container { display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; padding-right: 1rem; }
.msg-bubble { padding: 1rem 1.5rem; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
.msg-mine { background: linear-gradient(135deg, #0e7490, #67e8f9); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg-theirs { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }

    </style>

<div id="authScreen" class="auth-wrapper">

        <h2 style="margin-bottom: 0.5rem">Admin Portal</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Authorized Personnel Only</p>
        <input type="email" id="adminEmail" class="input-field" placeholder="Owner Email" style="margin-bottom: 1rem">
        <input type="password" id="adminPass" class="input-field" placeholder="Password" style="margin-bottom: 2rem">
        <button class="btn btn-primary" style="width: 100%" onclick="loginAdmin()">Secure Login</button>
    </div>
</div>

<!-- DASHBOARD SCREEN (Strictly Hidden Initially) -->
<div id="dashboardScreen" class="admin-layout" style="display: none;">
    <header class="admin-header">
        <div style="font-weight: 700; font-size: 1.2rem; letter-spacing: 1px;">EVOLVIX<span style="color:var(--c-brand-light)">ADMIN</span></div>
        <button class="btn btn-secondary" onclick="logout()" style="padding: 0.4rem 1rem; font-size: 0.8rem; border-color: var(--c-danger); color: var(--c-danger);">Logout</button>
    </header>
    
    <div class="admin-main">
        <aside class="admin-sidebar">
            <h3 style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-tertiary); text-transform: uppercase;">Clients</h3>

            <div id="clientList"></div>
        </aside>
        
        <main class="admin-content" id="clientDetailPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
                <div>
                    <h1 id="cdName" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Client Name</h1>
                    <p id="cdEmail" style="color: var(--text-secondary);">email@domain.com</p>
                </div>
                <div style="background: rgba(16,185,129,0.1); color: #10b981; padding: 0.4rem 1rem; border-radius: 99px; border: 1px solid rgba(16,185,129,0.3); font-weight: 700; font-size: 0.8rem;">ACTIVE</div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <!-- Vault Upload -->
                <div class="panel-card">
                    <h3 style="margin-bottom: 1rem;">Vault Upload</h3>
                    <p style="color: var(--text-tertiary); font-size: 0.9rem; margin-bottom: 1.5rem;">Securely transfer codebases, env files, or assets to this client.</p>
                    <div style="display: flex; gap: 1rem;">
                        <input type="file" id="fileUpload" class="input-field" style="padding: 0.5rem; flex: 1;">
                        <button class="btn btn-secondary" onclick="uploadFile()">Upload</button>
                    </div>
                </div>
                
                <!-- Direct Comms -->
                <div class="panel-card" style="display: flex; flex-direction: column;">
                    <h3 style="margin-bottom: 1rem;">Direct Comms</h3>
                    <div id="adminMsgs" class="msg-container" style="flex: 1; border: 1px solid var(--border-glass); border-radius: 12px; padding: 1rem; background: rgba(0,0,0,0.2);"></div>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <input type="text" id="adminMsgInput" class="input-field" placeholder="Type a message..." style="margin-bottom: 0;">
                        <button class="btn btn-primary" onclick="sendAdminMsg()">Send</button>
                    </div>
                </div>
            </div>
        </main>
        <main class="admin-content" id="emptyPanel" style="display: flex; align-items: center; justify-content: center;">
            <p style="color: var(--text-tertiary);">Select a client to view details</p>
        </main>
    </div>
</div>

<!-- Modal -->
<div id="newClientModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99999; align-items: center; justify-content: center;">
    <div class="auth-box" style="position: relative;">
        <button style="position: absolute; right: 1.5rem; top: 1.5rem; background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 1.2rem;" onclick="document.getElementById('newClientModal').style.display='none'">✕</button>
        <h3 style="margin-bottom: 2rem;">Create New Client</h3>
        <input type="text" id="ncName" class="input-field" placeholder="Client Name" style="margin-bottom: 1rem">
        <input type="email" id="ncEmail" class="input-field" placeholder="Client Email" style="margin-bottom: 1rem">
        <input type="text" id="ncPass" class="input-field" placeholder="Secure Password" style="margin-bottom: 2rem">
        <button class="btn btn-primary" style="width: 100%" onclick="createClient()">Generate Credentials</button>
    </div>
</div>

    <script>

// The base API URL will be updated to Render URL after deployment
const API_URL = 'https://evolvix-backend-nysg.onrender.com/api';
let currentToken = sessionStorage.getItem('ev_admin_token');
let selectedClientId = null;

if(currentToken) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'flex';
    loadClients();
}

async function loginAdmin() {
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPass').value;
    try {
        const res = await fetch(API_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if(data.token && data.role === 'admin') {
            sessionStorage.setItem('ev_admin_token', data.token);
            currentToken = data.token;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            loadClients();
        } else {
            alert('Invalid Admin Credentials');
        }
    } catch(e) {
        alert('Server unreachable. Ensure backend is running.');
    }
}

function logout() {
    sessionStorage.removeItem('ev_admin_token');
    location.reload();
}

async function loadClients() {
    const res = await fetch(API_URL + '/admin/clients', { headers: { 'Authorization': 'Bearer ' + currentToken }});
    if(res.status === 403 || res.status === 401) return logout();
    const clients = await res.json();
    
    const list = document.getElementById('clientList');
    list.innerHTML = '';
    clients.forEach(c => {
        const div = document.createElement('div');
        div.className = 'client-li';
        div.innerHTML = `<strong style="display:block; margin-bottom:0.2rem">${c.name}</strong><span style="font-size:0.8rem; color:var(--text-tertiary)">${c.email}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.client-li').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            selectClient(c);
        };
        list.appendChild(div);
    });
}

function selectClient(c) {
    selectedClientId = c.id;
    document.getElementById('emptyPanel').style.display = 'none';
    document.getElementById('clientDetailPanel').style.display = 'block';
    document.getElementById('cdName').innerText = c.name;
    document.getElementById('cdEmail').innerText = c.email;
    loadAdminMsgs();
}

async function createClient() {
    const name = document.getElementById('ncName').value;
    const email = document.getElementById('ncEmail').value;
    const password = document.getElementById('ncPass').value;
    const res = await fetch(API_URL + '/admin/clients', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken },
        body: JSON.stringify({ name, email, password })
    });
    if(res.ok) {
        document.getElementById('newClientModal').style.display = 'none';
        document.getElementById('ncName').value = '';
        document.getElementById('ncEmail').value = '';
        document.getElementById('ncPass').value = '';
        loadClients();
    } else {
        alert("Failed to create client.");
    }
}

async function uploadFile() {
    const file = document.getElementById('fileUpload').files[0];
    if(!file || !selectedClientId) return;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('client_id', selectedClientId);
    
    const res = await fetch(API_URL + '/files/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + currentToken },
        body: fd
    });
    if(res.ok) {
        alert('Secure File Uploaded');
        document.getElementById('fileUpload').value = '';
    } else {
        alert("Upload failed.");
    }
}

async function loadAdminMsgs() {
    if(!selectedClientId) return;
    const res = await fetch(API_URL + '/messages?client_id=' + selectedClientId, { headers: { 'Authorization': 'Bearer ' + currentToken }});
    const msgs = await res.json();
    const div = document.getElementById('adminMsgs');
    div.innerHTML = msgs.map(m => `
        <div class="msg-bubble ${m.sender_id === 1 ? 'msg-mine' : 'msg-theirs'}">
            ${m.message}
        </div>
    `).join('');
    div.scrollTop = div.scrollHeight;
}

async function sendAdminMsg() {
    const text = document.getElementById('adminMsgInput').value;
    if(!text || !selectedClientId) return;
    await fetch(API_URL + '/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken },
        body: JSON.stringify({ receiver_id: selectedClientId, message: text })
    });
    document.getElementById('adminMsgInput').value = '';
    loadAdminMsgs();
}

    </script>
</body>
</html>
