<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolvix Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030712;
            --bg-surface: rgba(15, 23, 42, 0.4);
            --border-glow: rgba(103, 232, 249, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #06b6d4;
            --accent-glow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-base); color: var(--text-primary); overflow: hidden; }
        
        /* Subtle Background Gradients */
        body::before {
            content: ''; position: absolute; top: -20%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(14,116,144,0.15), transparent 70%); z-index: -1;
        }
        body::after {
            content: ''; position: absolute; bottom: -20%; right: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.1), transparent 70%); z-index: -1;
        }

        /* Buttons & Inputs */
        .btn {
            background: linear-gradient(135deg, #0e7490, #06b6d4); color: #fff;
            border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; box-shadow: var(--accent-glow);
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-outline {
            background: transparent; border: 1px solid var(--border-glow); color: var(--text-primary); box-shadow: none;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .input-field {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glow);
            color: #fff; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; outline: none; transition: 0.2s;
        }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(6,182,212,0.2); }

        /* Layout */
        .auth-overlay {
            position: fixed; inset: 0; background: var(--bg-base); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--border-glow);
            padding: 3rem; border-radius: 24px; width: 420px; text-align: center;
        }
        
        .layout { display: flex; height: 100vh; display: none; } /* Hidden until auth */
        .sidebar {
            width: 320px; background: rgba(15,23,42,0.6); backdrop-filter: blur(24px);
            border-right: 1px solid var(--border-glow); display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 2rem; border-bottom: 1px solid var(--border-glow); }
        .client-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .client-item {
            padding: 1rem; border-radius: 12px; margin-bottom: 0.5rem; cursor: pointer;
            border: 1px solid transparent; transition: 0.2s;
        }
        .client-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); }
        .client-item.active { background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.3); box-shadow: inset 4px 0 0 var(--accent); }
        
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        
        /* Glass Panels */
        .glass-panel {
            background: rgba(255,255,255,0.02); backdrop-filter: blur(12px); border: 1px solid var(--border-glow);
            border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
        }

        /* Chat */
        .chat-box { display: flex; flex-direction: column; gap: 1rem; height: 400px; overflow-y: auto; padding-right: 1rem; margin-bottom: 1.5rem; }
        .chat-bubble { padding: 1rem 1.2rem; border-radius: 16px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; }
        .chat-mine { background: linear-gradient(135deg, #0e7490, #06b6d4); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-theirs { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="authScreen" class="auth-overlay">
        <div class="auth-card">
            <h1 style="margin-bottom: 0.5rem; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;">EVOLVIX<span style="color:var(--accent)">ADMIN</span></h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Level 5 Clearance Required</p>
            <input type="email" id="aEmail" class="input-field" placeholder="Owner Email">
            <input type="password" id="aPass" class="input-field" placeholder="Password">
            <button class="btn" style="width: 100%" onclick="login()">Authenticate</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashScreen" class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 style="font-size: 1.2rem; margin-bottom: 1.5rem;">Command Center</h2>
                <button class="btn" style="width: 100%; padding: 0.6rem;" onclick="document.getElementById('modal').style.display='flex'">+ Add Client</button>
            </div>
            <div class="client-list" id="cList"></div>
            <div style="padding: 1.5rem; border-top: 1px solid var(--border-glow);">
                <button class="btn btn-outline" style="width: 100%; padding: 0.5rem;" onclick="logout()">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <div id="emptyState" style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                Select a client from the sidebar.
            </div>
            
            <div id="clientDetails" style="display: none;">
                <div class="header">
                    <div>
                        <h1 id="cdName" style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Client</h1>
                        <p id="cdEmail" style="color: var(--text-secondary);">email</p>
                    </div>
                    <div style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; padding: 0.5rem 1rem; border-radius: 99px; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">ACTIVE</div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="glass-panel">
                        <h3 style="margin-bottom: 0.5rem;">Project Vault</h3>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">Securely transfer codebases and assets.</p>
                        <div style="display: flex; gap: 1rem;">
                            <input type="file" id="fUpload" class="input-field" style="margin: 0;">
                            <button class="btn" onclick="upload()">Upload</button>
                        </div>
                    </div>
                    
                    <div class="glass-panel" style="display: flex; flex-direction: column;">
                        <h3 style="margin-bottom: 1.5rem;">Direct Comms (Live)</h3>
                        <div id="chatBox" class="chat-box"></div>
                        <div style="display: flex; gap: 1rem;">
                            <input type="text" id="mInput" class="input-field" style="margin: 0;" placeholder="Message client...">
                            <button class="btn" onclick="send()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="auth-card" style="position: relative;">
            <button style="position: absolute; right: 1.5rem; top: 1.5rem; background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2rem;" onclick="document.getElementById('modal').style.display='none'">✕</button>
            <h2 style="margin-bottom: 2rem;">New Client</h2>
            <input type="text" id="ncName" class="input-field" placeholder="Client Name">
            <input type="email" id="ncEmail" class="input-field" placeholder="Client Email">
            <input type="text" id="ncPass" class="input-field" placeholder="Secure Password">
            <button class="btn" style="width: 100%" onclick="createC()">Generate Keys</button>
        </div>
    </div>

    <script>
        const API = 'https://evolvix-backend-nysg.onrender.com/api';
        let tok = sessionStorage.getItem('ev_adm_tok');
        let sel = null;
        let pollInt = null;

        if(tok) { document.getElementById('authScreen').style.display='none'; document.getElementById('dashScreen').style.display='flex'; loadC(); }

        async function login() {
            const res = await fetch(API+'/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: document.getElementById('aEmail').value, password: document.getElementById('aPass').value }) });
            const data = await res.json();
            if(data.token && data.role === 'admin') {
                tok = data.token; sessionStorage.setItem('ev_adm_tok', tok);
                document.getElementById('authScreen').style.display='none'; document.getElementById('dashScreen').style.display='flex'; loadC();
            } else alert('Access Denied');
        }

        function logout() { sessionStorage.removeItem('ev_adm_tok'); location.reload(); }

        async function loadC() {
            const res = await fetch(API+'/admin/clients', { headers: { 'Authorization': 'Bearer '+tok } });
            if(res.status===401||res.status===403) return logout();
            const clients = await res.json();
            const list = document.getElementById('cList'); list.innerHTML = '';
            clients.forEach(c => {
                const d = document.createElement('div'); d.className = 'client-item';
                d.innerHTML = `<strong style="display:block; margin-bottom:0.3rem">${c.name}</strong><span style="font-size:0.8rem; color:var(--text-secondary)">${c.email}</span>`;
                d.onclick = () => {
                    document.querySelectorAll('.client-item').forEach(el=>el.classList.remove('active'));
                    d.classList.add('active'); sel = c.id;
                    document.getElementById('emptyState').style.display='none';
                    document.getElementById('clientDetails').style.display='block';
                    document.getElementById('cdName').innerText = c.name; document.getElementById('cdEmail').innerText = c.email;
                    loadM(); if(pollInt) clearInterval(pollInt); pollInt = setInterval(loadM, 3000); // Live chat polling
                };
                list.appendChild(d);
            });
        }

        async function createC() {
            const res = await fetch(API+'/admin/clients', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+tok }, body: JSON.stringify({ name: document.getElementById('ncName').value, email: document.getElementById('ncEmail').value, password: document.getElementById('ncPass').value }) });
            if(res.ok) { document.getElementById('modal').style.display='none'; loadC(); alert('Client Created'); }
        }

        async function upload() {
            const f = document.getElementById('fUpload').files[0]; if(!f||!sel) return;
            const fd = new FormData(); fd.append('file', f); fd.append('client_id', sel);
            const res = await fetch(API+'/files/upload', { method: 'POST', headers: { 'Authorization': 'Bearer '+tok }, body: fd });
            if(res.ok) { alert('Uploaded to secure vault'); document.getElementById('fUpload').value=''; }
        }

        async function loadM() {
            if(!sel) return;
            const res = await fetch(API+'/messages?client_id='+sel, { headers: { 'Authorization': 'Bearer '+tok } });
            const msgs = await res.json();
            const b = document.getElementById('chatBox');
            const atBottom = b.scrollHeight - b.scrollTop <= b.clientHeight + 100;
            b.innerHTML = msgs.map(m => `<div class="chat-bubble ${m.sender_id===1?'chat-mine':'chat-theirs'}">${m.message}</div>`).join('');
            if(atBottom) b.scrollTop = b.scrollHeight;
        }

        async function send() {
            const t = document.getElementById('mInput').value; if(!t||!sel) return;
            document.getElementById('mInput').value='';
            await fetch(API+'/messages', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+tok }, body: JSON.stringify({ receiver_id: sel, message: t }) });
            loadM();
        }
    </script>
</body>
</html>
